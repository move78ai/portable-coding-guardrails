name: Bug report
description: Report a concrete defect in the repository.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What is broken?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: File or surface
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
